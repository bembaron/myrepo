<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheBembaron</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@400;700&display=swap" rel="stylesheet">
    
	<link rel="icon" type="image/png" href="b.png">
    <link rel="shortcut icon" type="image/png" href="b.png">
    <link rel="apple-touch-icon" href="b.png">
	
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Bebas Neue', Arial, sans-serif;
        }
        
        body {
            background: url('./bembaron2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .content {
            padding: 3rem 2rem;
            max-width: 85%;
        }
        
        h1 {
            font-size: 5.5rem;
            font-weight: 700;
            margin: 0 0 1rem 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        p {
            font-size: 1.6rem;
            margin: 0;
            line-height: 1.3;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 3.8rem; 
			/*letter-spacing: 0px;*/
			letter-spacing: -0.01em;	}
            p { font-size: 1.4rem; }
            .content { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>BEMBARON</h1>
        <p><br>
           </p>
    </div>
</body>
</html>

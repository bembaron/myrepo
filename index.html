<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Page Title</title>
    
    <!-- Import Bebas Neue from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Bebas Neue', Arial, sans-serif;
        }
        
        body {
            background: url('./bembaron2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .content {
            /*background: rgba(0, 0, 0, 0.45);    semi-transparent dark overlay */
            padding: 3rem 2rem;
            /*border-radius: 12px;*/
            max-width: 85%;
        }
        
        h1 {
            font-size: 5.5rem;
            font-weight: 700;
            margin: 0 0 1rem 0;
            letter-spacing: 2px;
            text-transform: uppercase;
			text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.8);   /* Helps black text stand out */
        }
        
        p {
            font-size: 1.6rem;
            margin: 0;
            line-height: 1.3;
			text-shadow: 1px 1px 6px rgba(255, 255, 255, 0.9);   /* Soft white shadow for readability */
        }
        
        /* Make it look good on smaller screens */
        @media (max-width: 768px) {
            h1 { font-size: 3.8rem; }
            p { font-size: 1.4rem; }
            .content { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>BEMBARON</h1>
        <p><br>
           </p>
    </div>
</body>
</html>
